<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Facebook Factory</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding:20px; }
        .container { max-width:700px; margin:auto; }
        input, button { width:100%; padding:15px; margin:10px 0; font-size:18px; }
        button { background:#0066ff; color:white; border:none; cursor:pointer; }
        pre { text-align:left; background:#222; padding:15px; max-height:400px; overflow:auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Facebook Factory</h1>
        <p id="status">🟢 Server Online</p>
        
        <input type="text" id="topic" placeholder="ভিডিওর টপিক লিখুন (যেমন: ঢাকা)">
        
        <button onclick="generate()">Generate AI Video</button>
        
        <pre id="result"></pre>
    </div>

    <script>
        console.log("✅ Inline Script Loaded");

        async function generate() {
            console.log("🚀 Button Clicked!");

            const topic = document.getElementById("topic").value.trim();
            if (!topic) {
                alert("টপিক লিখুন!");
                return;
            }

            const status = document.getElementById("status");
            const result = document.getElementById("result");

            status.innerHTML = `⏳ "${topic}" এর জন্য ভিডিও তৈরি হচ্ছে...`;
            result.innerHTML = "";

            try {
                const res = await fetch("/api/automation/run", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic })
                });

                const data = await res.json();

                if (data.success) {
                    status.innerHTML = "✅ সফল হয়েছে!";
                    result.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    status.innerHTML = "❌ ব্যর্থ হয়েছে";
                    result.innerText = data.error || "Error";
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = "❌ এরর: " + err.message;
            }
        }

        console.log("✅ generate() function ready");
    </script>
</body>
</html>
